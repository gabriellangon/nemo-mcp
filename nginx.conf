# ============================================================
# Nginx reverse proxy for Nemo MCP
# Place this in /etc/nginx/sites-available/nemo-mcp
# Then: ln -s /etc/nginx/sites-available/nemo-mcp /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 443 ssl http2;
    server_name nemo.yourdomain.com;  # Change this

    # SSL certificates (use certbot to generate)
    ssl_certificate /etc/letsencrypt/live/nemo.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nemo.yourdomain.com/privkey.pem;

    location /mcp {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Important for streaming/SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://127.0.0.1:3100;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name nemo.yourdomain.com;
    return 301 https://$server_name$request_uri;
}
